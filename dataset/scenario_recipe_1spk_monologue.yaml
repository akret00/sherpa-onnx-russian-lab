  description: 'Rotation 1: D1->Spk1, D2->Spk2, D3->Spk3, D4->Spk4'
  events:
  - file_id: 1
    segment_id: 1
    start: 0.0
    end: 4.26
    text: Привет Проверяем запись голоса. Раз, два, три.
    gain_db: 0.0
  - file_id: 1
    segment_id: 2
    start: 5.26
    end: 8.53
    text: Сегодня я говорю нормально и достаточно спокойно
    gain_db: 0.0
  - file_id: 1
    segment_id: 3
    start: 9.53
    end: 12.57
    text: А сейчас попробую говорить чуть быстрее, не сбиваясь.
    gain_db: 0.0
  - file_id: 1
    segment_id: 4
    start: 13.57
    end: 17.38
    text: Э-э, подожди, я начну заново. Говорю чуть быстрее
    gain_db: 0.0
  - file_id: 1
    segment_id: 5
    start: 18.38
    end: 22.07
    text: Мне нужен доступ к API, токен и секретный ключ.
    gain_db: 0.0
  - file_id: 1
    segment_id: 6
    start: 23.07
    end: 26.31
    text: GPU перегружен, а CPU ещё терпит.
    gain_db: 0.0
  - file_id: 1
    segment_id: 7
    start: 27.31
    end: 30.96
    text: Давай обсудим план. Сначала подготовка, потом тесты
    gain_db: 0.0
  - file_id: 1
    segment_id: 8
    start: 31.96
    end: 34.88
    text: Потом отчёты и короткое резюме в конце.
    gain_db: 0.0
  - file_id: 1
    segment_id: 9
    start: 35.88
    end: 39.15
    text: Файл называется Test Audio файнел два
    gain_db: 0.0
  - file_id: 1
    segment_id: 10
    start: 40.15
    end: 44.06
    text: Сохрани, как ваф шеснадцать килогерц моно
    gain_db: 0.0
  - file_id: 1
    segment_id: 11
    start: 45.06
    end: 48.84
    text: Я отправил запрос, но сервер выдаёт ошибку пятьсот
    gain_db: 0.0
  - file_id: 1
    segment_id: 12
    start: 49.84
    end: 53.2
    text: Скорее всего, дело в конфиге. Проверь ветку дев.
    gain_db: 0.0
  - file_id: 1
    segment_id: 13
    start: 54.2
    end: 57.31
    text: О'кей, сейчас посмотрю логи и сразу отпишусь
    gain_db: 0.0
  - file_id: 1
    segment_id: 14
    start: 58.31
    end: 63.21
    text: 'Запиши адрес: улица Лесная, дом семь, квартира двенадцать'
    gain_db: 0.0
  - file_id: 1
    segment_id: 15
    start: 64.21
    end: 69.24
    text: Мой номер заказа два ноль два четыре тире ноль ноль один
    gain_db: 0.0
  - file_id: 1
    segment_id: 16
    start: 70.24
    end: 73.41
    text: Сумма три тысячи четыреста пятьдесят рублей
    gain_db: 0.0
  - file_id: 1
    segment_id: 17
    start: 74.41
    end: 77.68
    text: Скидка десять процентов, действует до пятницы
    gain_db: 0.0
  - file_id: 1
    segment_id: 18
    start: 78.68
    end: 82.71
    text: ООО Линия и ИП Петров — разные получатели.
    gain_db: 0.0
  - file_id: 1
    segment_id: 19
    start: 83.71
    end: 87.45
    text: НДС включён в стоимость, но не всегда очевидно
    gain_db: 0.0
  - file_id: 1
    segment_id: 20
    start: 88.45
    end: 91.3
    text: Пожалуйста, повтори последнюю цифру ещё раз
    gain_db: 0.0
  - file_id: 1
    segment_id: 21
    start: 92.3
    end: 97.16
    text: Последняя цифра — восемь. Нет, девять. Извини, девять
    gain_db: 0.0
  - file_id: 1
    segment_id: 22
    start: 98.16
    end: 103.44
    text: Проверка. Один, два, три, четыре, пять.
    gain_db: 0.0
  - file_id: 1
    segment_id: 23
    start: 104.44
    end: 108.76
    text: Проверка. Десять, двадцать, тридцать, сорок.
    gain_db: 0.0
  - file_id: 1
    segment_id: 24
    start: 109.76
    end: 113.38
    text: 'Проверка: сто один, сто два, сто три'
    gain_db: 0.0
  - file_id: 1
    segment_id: 25
    start: 114.38
    end: 118.29
    text: ИНН семьдесят семь ноль один. Далее без изменений
    gain_db: 0.0
  - file_id: 1
    segment_id: 26
    start: 119.29
    end: 122.91
    text: Почта для связи. инфа собака домен точка ру
    gain_db: 0.0
  - file_id: 1
    segment_id: 27
    start: 123.91
    end: 126.89
    text: Скажи, пожалуйста, во сколько начинается встреча
    gain_db: 0.0
  - file_id: 1
    segment_id: 28
    start: 127.89
    end: 131.47
    text: Встреча в девятнадцать сорок пять, без опозданий
    gain_db: 0.0
  - file_id: 1
    segment_id: 29
    start: 132.47
    end: 135.23
    text: Нет, так не пойдёт. Давай сделаем по-другому.
    gain_db: 0.0
  - file_id: 1
    segment_id: 30
    start: 136.23
    end: 139.95
    text: Я думаю, нет, я уверен, это правильное решение.
    gain_db: 0.0
  - file_id: 1
    segment_id: 31
    start: 140.95
    end: 143.99
    text: Ключи от гаража, кажется, лежат у зеркала.
    gain_db: 0.0
  - file_id: 1
    segment_id: 32
    start: 144.99
    end: 148.04
    text: Ты серьёзно? Я там уже смотрел два раза.
    gain_db: 0.0
  - file_id: 1
    segment_id: 33
    start: 149.04
    end: 151.86
    text: Ладно, проверю ещё раз и напишу тебе
    gain_db: 0.0
  - file_id: 1
    segment_id: 34
    start: 152.86
    end: 155.27
    text: Не перебивай меня, я сейчас договорил.
    gain_db: 0.0
  - file_id: 1
    segment_id: 35
    start: 156.27
    end: 158.74
    text: Нет-нет, я просто уточняю, продолжай
    gain_db: 0.0
  - file_id: 1
    segment_id: 36
    start: 159.74
    end: 163.3
    text: Да как так-то? Мы же договаривались на утро.
    gain_db: 0.0
  - file_id: 1
    segment_id: 37
    start: 164.3
    end: 167.09
    text: Слушай, ну не сердись, планы немного поменялись
    gain_db: 0.0
  - file_id: 1
    segment_id: 38
    start: 168.09
    end: 171.1
