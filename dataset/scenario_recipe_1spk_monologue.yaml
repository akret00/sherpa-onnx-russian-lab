    text: Пять
    gain_db: 0.0
  - file_id: 1
    segment_id: 82
    start: 311.55
    end: 314.34
    text: Минутку, я сейчас найду нужный документ
    gain_db: 0.0
  - file_id: 1
    segment_id: 83
    start: 315.34
    end: 318.22
    text: Всё, я на связи. Что я пропустил?
    gain_db: 0.0
  - file_id: 1
    segment_id: 84
    start: 319.22
    end: 321.56
