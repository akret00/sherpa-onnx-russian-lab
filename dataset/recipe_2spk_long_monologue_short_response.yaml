recipe_type: "long_monologues_with_short_responses"
description: >
  Ситуация, в которой Первый выступающий произносит длинные, непрерывные
  монологи (технические описания, списки, рассказы), а Второй выступающий
  прерывает его или отвечает короткими фразами.

timeline:
  - step_id: 1
    speaker_id: 1
    phrase_id: 7 # "Давай обсудим план: сначала подготовка, потом тесты."
  - step_id: 2
    speaker_id: 2
    phrase_id: 47 # "Ок"
  - step_id: 3
    speaker_id: 1
    phrase_id: 12 # "Скорее всего, дело в конфиге, проверь ветку дев."
  - step_id: 4
    speaker_id: 2
    phrase_id: 39 # "Понял"
  - step_id: 5
    speaker_id: 1
    phrase_id: 15 # "Мой номер заказа: два ноль два четыре, тире, ноль ноль один."
  - step_id: 6
    speaker_id: 2
    phrase_id: 50 # "Так-так"
  - step_id: 7
    speaker_id: 1
    phrase_id: 16 # "Сумма: три тысячи четыреста пятьдесят рублей."
  - step_id: 8
    speaker_id: 2
    phrase_id: 52 # "Ясно"
  - step_id: 9
    speaker_id: 1
    phrase_id: 25 # "ИНН семьдесят семь ноль один, далее без изменений."
  - step_id: 10
    speaker_id: 2
    phrase_id: 44 # "Конечно"
  - step_id: 11
    speaker_id: 1
    phrase_id: 30 # "Я думаю… нет, я уверен: это правильное решение."
  - step_id: 12
    speaker_id: 2
    phrase_id: 53 # "Не уверен"
  - step_id: 13
    speaker_id: 1
    phrase_id: 60 # "С одной стороны — это дорого, с другой — надежно."
  - step_id: 14
    speaker_id: 2
    phrase_id: 42 # "Ага"
  - step_id: 15
    speaker_id: 1
    phrase_id: 57 # "Сейчас будет перечисление: чай, кофе, вода, сок."
  - step_id: 16
    speaker_id: 2
    phrase_id: 45 # "Хорошо"
  - step_id: 17
    speaker_id: 1
    phrase_id: 61 # "Тот, кто придет последним, будет закрывать офис."
  - step_id: 18
    speaker_id: 2
    phrase_id: 54 # "Точно"
  - step_id: 19
    speaker_id: 1
    phrase_id: 63 # "Я отправлю отчёт завтра утром, после девяти."
  - step_id: 20
    speaker_id: 2
    phrase_id: 40 # "Да"
  - step_id: 21
    speaker_id: 1
    phrase_id: 66 # "Подтверди: ты оплатил счёт или только собираешься?"
  - step_id: 22
    speaker_id: 2
    phrase_id: 41 # "Нет"
  - step_id: 23
    speaker_id: 1
    phrase_id: 67 # "Я оплатил счёт, но чек пока не пришёл."
  - step_id: 24
    speaker_id: 2
    phrase_id: 43 # "Ой"
  - step_id: 25
    speaker_id: 1
    phrase_id: 70 # "Осталось примерно семь минут, может чуть меньше."
  - step_id: 26
    speaker_id: 2
    phrase_id: 51 # "В смысле?"
  - step_id: 27
    speaker_id: 1
    phrase_id: 82 # "Минутку, я сейчас найду нужный документ."
  - step_id: 28
    speaker_id: 2
    phrase_id: 48 # "Эм ..."
  - step_id: 29
    speaker_id: 1
    phrase_id: 85 # "На этом всё. Запись можно останавливать."
