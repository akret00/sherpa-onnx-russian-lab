recipe_id: "four_speakers_round_table"
description: >
  Имитация сбалансированного совещания, в котором 4 докладчика выступают последовательно
  с одинаковым весом, без доминирующих ведущих.

timeline:
  # Круг 1: Настройка сессии и статус-апдейт
  - step_id: 1
    dictor_id: 1
    phrase_id: 1 # "Привет. Проверяем запись голоса, раз, два, три."
  - step_id: 2
    dictor_id: 2
    phrase_id: 64 # "Проверка связи: слышно меня хорошо?"
  - step_id: 3
    dictor_id: 3
    phrase_id: 7 # "Давай обсудим план: сначала подготовка, потом тесты."
  - step_id: 4
    dictor_id: 4
    phrase_id: 8 # "Потом отчёт и короткое резюме в конце."

  # Круг 2: Обсуждение технических деталей (API и конфиги)
  - step_id: 5
    dictor_id: 1
    phrase_id: 5 # "Мне нужен доступ к API, токен и секретный ключ."
  - step_id: 6
    dictor_id: 2
    phrase_id: 11 # "Я отправил запрос, но сервер выдает ошибку пятьсот."
  - step_id: 7
    dictor_id: 3
    phrase_id: 12 # "Скорее всего, дело в конфиге, проверь ветку дев."
  - step_id: 8
    dictor_id: 4
    phrase_id: 13 # "Окей, сейчас посмотрю логи и сразу отпишусь."

  # Круг 3: Согласование данных и документов
  - step_id: 9
    dictor_id: 1
    phrase_id: 16 # "Сумма: три тысячи четыреста пятьдесят рублей."
  - step_id: 10
    dictor_id: 2
    phrase_id: 17 # "Скидка десять процентов действует до пятницы."
  - step_id: 11
    dictor_id: 3
    phrase_id: 82 # "Минутку, я сейчас найду нужный документ."
  - step_id: 12
    dictor_id: 4
    phrase_id: 83 # "Всё, я на связи. Что я пропустил?"

  # Круг 4: Сложная пунктуация и логика
  - step_id: 13
    dictor_id: 1
    phrase_id: 60 # "С одной стороны — это дорого, с другой — надежно."
  - step_id: 14
    dictor_id: 2
    phrase_id: 61 # "Тот, кто придет последним, будет закрывать офис."
  - step_id: 15
    dictor_id: 3
    phrase_id: 62 # "Впрочем, если хочешь, можем оставить всё как есть."
  - step_id: 16
    dictor_id: 4
    phrase_id: 63 # "Я отправлю отчёт завтра утром, после девяти."

  # Круг 5: Завершение встречи
  - step_id: 17
    dictor_id: 1
    phrase_id: 69 # "Сколько минут осталось до конца?"
  - step_id: 18
    dictor_id: 2
    phrase_id: 70 # "Осталось примерно семь минут, может чуть меньше."
  - step_id: 19
    dictor_id: 3
    phrase_id: 84 # "Давай закругляться, время уже поджимает."
  - step_id: 20
    dictor_id: 4
    phrase_id: 85 # "На этом всё. Запись можно останавливать."
