episodes:
- id: two_speakers_dialogue_rot1
  description: 'Rotation 1: D1->Spk1, D2->Spk2, D3->Spk3, D4->Spk4'
  events:
  - file_id: 1
    segment_id: 1
    start: 0.0
    end: 4.26
    text: Привет Проверяем запись голоса. Раз, два, три.
    gain_db: 0.0
  - file_id: 2
    segment_id: 64
    start: 5.26
    end: 7.74
    text: Проверка связи. Слышно меня хорошо?
    gain_db: 0.0
  - file_id: 1
    segment_id: 64
    start: 8.74
    end: 11.56
    text: Да, слышно. Говори чуть ближе к микрофону
    gain_db: 0.0
  - file_id: 2
    segment_id: 2
    start: 12.56
    end: 15.48
    text: Сегодня я говорю нормально и достаточно спокойно.
    gain_db: 0.0
  - file_id: 2
    segment_id: 3
    start: 16.48
    end: 19.63
    text: А сейчас попробую говорить быстрее, чуть быстрее, не сбиваясь
    gain_db: 0.0
  - file_id: 1
    segment_id: 45
    start: 20.63
    end: 21.78
    text: Хорошо.
    gain_db: 0.0
  - file_id: 2
    segment_id: 7
    start: 22.78
    end: 26.94
    text: Давай обсудим план. Сначала подготовка, потом тесты
    gain_db: 0.0
  - file_id: 1
    segment_id: 8
    start: 27.94
    end: 30.86
    text: Потом отчёты и короткое резюме в конце.
    gain_db: 0.0
  - file_id: 2
    segment_id: 5
    start: 31.86
    end: 35.42
    text: 'Мне нужен доступ к IP: токен и секретный ключ.'
    gain_db: 0.0
  - file_id: 1
    segment_id: 11
    start: 36.42
    end: 40.2
    text: Я отправил запрос, но сервер выдаёт ошибку пятьсот
    gain_db: 0.0
  - file_id: 2
    segment_id: 12
    start: 41.2
    end: 48.07
    text: Скорее всего, дело в конфиге. Проверь ветвь. Ветку дев. Жесть.
    gain_db: 0.0
  - file_id: 1
    segment_id: 13
    start: 49.07
    end: 52.18
    text: О'кей, сейчас посмотрю логи и сразу отпишусь
    gain_db: 0.0
  - file_id: 2
    segment_id: 47
    start: 53.18
    end: 53.88
    text: Ок
    gain_db: 0.0
  - file_id: 1
    segment_id: 27
    start: 54.88
    end: 57.86
    text: Скажи, пожалуйста, во сколько начинается встреча
    gain_db: 0.0
  - file_id: 2
    segment_id: 28
    start: 58.86
    end: 62.43
    text: Встреча в девятнадцать сорок пять, без опоздания
    gain_db: 0.0
  - file_id: 1
    segment_id: 36
    start: 63.43
    end: 66.99
    text: Да как так-то? Мы же договаривались на утро.
    gain_db: 0.0
  - file_id: 2
    segment_id: 37
    start: 67.99
    end: 70.76
    text: Слушай, ну не сердись. Планы немного поменялись
    gain_db: 0.0
  - file_id: 1
    segment_id: 29
    start: 71.76
    end: 74.52
    text: Нет, так не пойдёт. Давай сделаем по-другому.
    gain_db: 0.0
  - file_id: 2
    segment_id: 49
    start: 75.52
    end: 76.33
    text: Ну-у-у
    gain_db: 0.0
  - file_id: 1
    segment_id: 30
    start: 77.33
    end: 81.05
    text: Я думаю, нет, я уверен, это правильное решение.
    gain_db: 0.0
  - file_id: 2
    segment_id: 53
    start: 82.05
    end: 83.16
    text: Не уверен
    gain_db: 0.0
  - file_id: 2
    segment_id: 60
    start: 84.16
    end: 88.83
    text: С одной стороны, это дорого, с другой — надёжно.
    gain_db: 0.0
  - file_id: 1
    segment_id: 54
    start: 89.83
    end: 93.03
    text: Вопрос сложный, но ответ короткий. Да.
    gain_db: 0.0
  - file_id: 2
    segment_id: 66
    start: 94.03
    end: 98.51
    text: Подтверди. Ты оплатил счёт или только собираешься?
    gain_db: 0.0
  - file_id: 1
    segment_id: 66
    start: 99.51
    end: 102.1
    text: Я оплатил счёт, но чек пока не пришёл.
    gain_db: 0.0
  - file_id: 2
    segment_id: 16
    start: 103.1
    end: 107.29
    text: Сумма три тысячи четыреста пятьдесят рублей
    gain_db: 0.0
  - file_id: 1
    segment_id: 17
    start: 108.29
    end: 111.56
    text: Скидка десять процентов, действует до пятницы
    gain_db: 0.0
  - file_id: 2
    segment_id: 20
    start: 112.56
    end: 115.83
    text: Пожалуйста, повтори последнюю цифру ещё раз
    gain_db: 0.0
  - file_id: 1
    segment_id: 21
    start: 116.83
    end: 121.69
    text: Последняя цифра — восемь. Нет, девять. Извини, девять
    gain_db: 0.0
  - file_id: 2
    segment_id: 52
    start: 122.69
    end: 123.8
    text: Ясно
    gain_db: 0.0
  - file_id: 1
    segment_id: 15
    start: 124.8
    end: 129.83
    text: Мой номер заказа два ноль два четыре тире ноль ноль один
    gain_db: 0.0
  - file_id: 2
    segment_id: 25
    start: 130.83
    end: 136.47
    text: ИНН семьдесят семь ноль один, Далее без изменений.
    gain_db: 0.0
  - file_id: 1
    segment_id: 26
    start: 137.47
    end: 141.09
    text: Почта для связи. инфа собака домен точка ру
    gain_db: 0.0
  - file_id: 2
    segment_id: 44
    start: 142.09
    end: 143.24
    text: конечно
    gain_db: 0.0
  - file_id: 1
    segment_id: 62
    start: 144.24
    end: 147.6
    text: Я отправлю отчёт завтра утром, после девяти.
    gain_db: 0.0
  - file_id: 2
    segment_id: 69
    start: 148.6
    end: 151.38
    text: Сколько минут осталось до конца?
    gain_db: 0.0
  - file_id: 1
    segment_id: 69
    start: 152.38
    end: 155.68
    text: Осталось примерно семь минут, может, чуть меньше
    gain_db: 0.0
  - file_id: 2
    segment_id: 73
    start: 156.68
    end: 159.95
    text: Я немного устал, поэтому говорю чуть тише
    gain_db: 0.0
  - file_id: 1
    segment_id: 74
    start: 160.95
    end: 164.25
    text: А теперь скажу громче, чтобы было контрастно
    gain_db: 0.0
  - file_id: 2
    segment_id: 82
    start: 165.25
    end: 167.91
    text: Минутку, сейчас найду нужен документ
    gain_db: 0.0
  - file_id: 1
    segment_id: 83
    start: 168.91
    end: 171.79
    text: Всё, я на связи. Что я пропустил?
    gain_db: 0.0
  - file_id: 2
    segment_id: 84
    start: 172.79
    end: 175.73
    text: Давай закругляться, время уже поджимает.
    gain_db: 0.0
  - file_id: 1
    segment_id: 85
    start: 176.73
    end: 179.1
    text: На этом всё, запись можно останавливать
    gain_db: 0.0
  noise:
    enabled: false
    file: null
    snr_db: null
