  #### Блок 5: Сложная пунктуация и структура предложений (для моделей с пунктуацией)
  - id: 55 
    text: "Вопрос сложный, но ответ короткий: да."
  - id: 56 
    text: "Вопрос сложный, но ответ короткий: нет."
  - id: 57 
    text: "Сейчас будет перечисление: чай, кофе, вода, сок."
  - id: 58 
    text: "Я нарочно делаю паузу… и продолжаю."
  - id: 59 
    text: "Секунду… я отвлёкся. Продолжаем."
  - id: 60 
    text: "С одной стороны — это дорого, с другой — надежно."
  - id: 61 
    text: "Тот, кто придет последним, будет закрывать офис."
  - id: 62 
    text: "Впрочем, если хочешь, можем оставить всё как есть."
  #### Блок 6: Управление сессией и связки
  - id: 63 
    text: "Я отправлю отчёт завтра утром, после девяти."
  - id: 64 
    text: "Проверка связи: слышно меня хорошо?"
  - id: 65 
    text: "Да, слышно. Говори чуть ближе к микрофону."
  - id: 66 
    text: "Подтверди: ты оплатил счёт или только собираешься?"
  - id: 67 
    text: "Я оплатил счёт, но чек пока не пришёл."
  - id: 68 
    text: "Срок — один день. Максимум два."
  - id: 69 
    text: "Сколько минут осталось до конца?"
  - id: 70 
    text: "Осталось примерно семь минут, может чуть меньше."
  - id: 71 
    text: "Сделай звук потише, пожалуйста."
  - id: 72 
    text: "Сделай звук погромче… вот так, нормально."
  - id: 73 
    text: "Я немного устал, поэтому говорю чуть тише."
  - id: 74 
    text: "А теперь скажу громче, чтобы было контрастно!"
  - id: 75 
    text: "Если что-то непонятно, переспроси."
  - id: 76 
    text: "Раз"
  - id: 77 
    text: "Один"
  - id: 78 
    text: "Два"
  - id: 79 
