    dictor_id: 1
    phrase_id: 26 # "Почта для связи: инфо собака домен точка ру."
  - step_id: 34
    dictor_id: 2
    phrase_id: 44 # "Конечно"
  - step_id: 35
    dictor_id: 1
    phrase_id: 63 # "Я отправлю отчёт завтра утром, после девяти."
