recipe_id: "two_speakers_dialogue"
description: >
  Структурированный диалог между двумя говорящими. Включает технический контекст,
  числовые данные, короткие ответы и вопросы.
pause_ms: 1000 # Интервал между сегментами, в миллисекундах
timeline:
  - step_id: 1
    dictor_id: 1
    phrase_id: 1 # "Привет. Проверяем запись голоса, раз, два, три."
