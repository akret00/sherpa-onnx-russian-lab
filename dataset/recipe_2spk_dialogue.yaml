    dictor_id: 2
    phrase_id: 69 # "Сколько минут осталось до конца?"
  - step_id: 37
    dictor_id: 1
    phrase_id: 70 # "Осталось примерно семь минут, может чуть меньше."
  - step_id: 38
    dictor_id: 2
    phrase_id: 73 # "Я немного устал, поэтому говорю чуть тише."
  - step_id: 39
    dictor_id: 1
    phrase_id: 74 # "А теперь скажу громче, чтобы было контрастно!"
  - step_id: 40
    dictor_id: 2
    phrase_id: 82 # "Минутку, я сейчас найду нужный документ."
  - step_id: 41
    dictor_id: 1
    phrase_id: 83 # "Всё, я на связи. Что я пропустил?"
  - step_id: 42
    dictor_id: 2
    phrase_id: 84 # "Давай закругляться, время уже поджимает."
  - step_id: 43
