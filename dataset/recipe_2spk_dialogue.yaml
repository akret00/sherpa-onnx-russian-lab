    dictor_id: 2
    phrase_id: 12 # "Скорее всего, дело в конфиге, проверь ветку дев."
  - step_id: 12
    dictor_id: 1
    phrase_id: 13 # "Окей, сейчас посмотрю логи и сразу отпишусь."
  - step_id: 13
    dictor_id: 2
    phrase_id: 47 # "Ок"
  - step_id: 14
    dictor_id: 1
    phrase_id: 27 # "Скажи, пожалуйста, во сколько начинается встреча?"
  - step_id: 15
    dictor_id: 2
    phrase_id: 28 # "Встреча в девятнадцать сорок пять, без опозданий."
  - step_id: 16
    dictor_id: 1
    phrase_id: 36 # "Да как так-то? Мы же договаривались на утро!"
  - step_id: 17
    dictor_id: 2
    phrase_id: 37 # "Слушай, ну не сердись, планы немного поменялись."
  - step_id: 18
    dictor_id: 1
    phrase_id: 29 # "Нет, так не пойдёт. Давай сделаем по‑другому!"
  - step_id: 19
    dictor_id: 2
    phrase_id: 49 # "Ну ..."
  - step_id: 20
    dictor_id: 1
    phrase_id: 30 # "Я думаю… нет, я уверен: это правильное решение."
  - step_id: 21
    dictor_id: 2
    phrase_id: 53 # "Не уверен"
  - step_id: 22
    dictor_id: 2
    phrase_id: 60 # "С одной стороны — это дорого, с другой — надежно."
  - step_id: 23
    dictor_id: 1
    phrase_id: 55 # "Вопрос сложный, но ответ короткий: да."
  - step_id: 24
    dictor_id: 2
    phrase_id: 66 # "Подтверди: ты оплатил счёт или только собираешься?"
  - step_id: 25
    dictor_id: 1
