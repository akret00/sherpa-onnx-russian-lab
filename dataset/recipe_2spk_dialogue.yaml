    dictor_id: 2
    phrase_id: 20 # "Пожалуйста, повтори последнюю цифру ещё раз."
  - step_id: 29
    dictor_id: 1
    phrase_id: 21 # "Последняя цифра — восемь. Нет, девять. Извини, девять."
