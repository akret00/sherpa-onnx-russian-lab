- id: four_speakers_two_leads_two_commentators_rot1
  description: 'Rotation 1: D1->Spk1, D2->Spk2, D3->Spk3, D4->Spk4'
  events:
  - file_id: 1
    segment_id: 1
    start: 0.0
    end: 4.26
    text: Привет Проверяем запись голоса. Раз, два, три.
    gain_db: 0.0
  - file_id: 2
    segment_id: 64
    start: 4.26
    end: 6.74
    text: Проверка связи. Слышно меня хорошо?
    gain_db: 0.0
  - file_id: 3
    segment_id: 11
    start: 6.74
    end: 9.3
    text: Да, слышно. Говори чуть ближе к микрофону
    gain_db: 0.0
  - file_id: 1
    segment_id: 7
    start: 9.3
    end: 12.95
    text: Давай обсудим план. Сначала подготовка, потом тесты
    gain_db: 0.0
  - file_id: 2
    segment_id: 8
    start: 12.95
    end: 16.36
    text: потом отчёты, и короткое резюме в конце
    gain_db: 0.0
  - file_id: 1
    segment_id: 11
    start: 16.36
    end: 20.14
    text: Я отправил запрос, но сервер выдаёт ошибку пятьсот
    gain_db: 0.0
  - file_id: 4
    segment_id: 43
    start: 20.14
    end: 21.04
    text: Ой
    gain_db: 0.0
  - file_id: 2
    segment_id: 12
    start: 21.04
    end: 27.91
    text: Скорее всего, дело в конфиге. Проверь ветвь. Ветку дев. Жесть.
    gain_db: 0.0
  - file_id: 3
    segment_id: 18
    start: 27.91
    end: 30.47
    text: Мне нужен доступ к PI, токен и секретный ключ
    gain_db: 0.0
  - file_id: 1
    segment_id: 13
    start: 30.47
    end: 33.58
    text: О'кей, сейчас посмотрю логи и сразу отпишусь
    gain_db: 0.0
  - file_id: 4
    segment_id: 47
    start: 33.58
    end: 34.32
    text: Ок
    gain_db: 0.0
  - file_id: 1
    segment_id: 36
    start: 34.32
    end: 37.88
    text: Да как так-то? Мы же договаривались на утро.
    gain_db: 0.0
  - file_id: 2
    segment_id: 37
    start: 37.88
    end: 40.65
    text: Слушай, ну не сердись. Планы немного поменялись
    gain_db: 0.0
  - file_id: 4
    segment_id: 51
    start: 40.65
    end: 41.61
    text: в смысле
    gain_db: 0.0
  - file_id: 1
    segment_id: 16
    start: 41.61
    end: 44.78
    text: Сумма три тысячи четыреста пятьдесят рублей
    gain_db: 0.0
  - file_id: 2
    segment_id: 20
    start: 44.78
    end: 48.05
    text: Пожалуйста, повтори последнюю цифру ещё раз
    gain_db: 0.0
  - file_id: 3
    segment_id: 49
    start: 48.05
    end: 50.44
    text: Секунду. Я отвлёкся. Продолжаем.
    gain_db: 0.0
  - file_id: 4
    segment_id: 54
    start: 50.44
    end: 51.21
    text: Точно
    gain_db: 0.0
  - file_id: 1
    segment_id: 68
    start: 51.21
    end: 53.42
    text: Сколько минут осталось до конца
    gain_db: 0.0
  - file_id: 2
    segment_id: 70
    start: 53.42
    end: 56.2
    text: Осталось примерно семь минут. Может, чуть меньше
    gain_db: 0.0
  - file_id: 1
    segment_id: 84
    start: 56.2
    end: 58.54
    text: Давай закругляться. Время уже поджимает
    gain_db: 0.0
  - file_id: 2
    segment_id: 85
    start: 58.54
    end: 62.03
    text: На этом всё. Запись можно останавливать
    gain_db: 0.0
