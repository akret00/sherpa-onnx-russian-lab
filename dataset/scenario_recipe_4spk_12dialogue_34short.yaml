- id: four_speakers_two_leads_two_commentators_rot1
  description: 'Rotation 1: D1->Spk1, D2->Spk2, D3->Spk3, D4->Spk4'
  events:
  - file_id: 1
    segment_id: 1
    start: 0.0
    end: 4.26
    text: Привет Проверяем запись голоса. Раз, два, три.
    gain_db: 0.0
  - file_id: 2
    segment_id: 64
    start: 5.26
    end: 7.74
    text: Проверка связи. Слышно меня хорошо?
    gain_db: 0.0
  - file_id: 3
    segment_id: 11
    start: 8.74
    end: 11.3
    text: Да, слышно. Говори чуть ближе к микрофону
    gain_db: 0.0
  - file_id: 1
    segment_id: 7
    start: 12.3
    end: 15.95
    text: Давай обсудим план. Сначала подготовка, потом тесты
    gain_db: 0.0
  - file_id: 2
    segment_id: 8
    start: 16.95
    end: 20.36
    text: потом отчёты, и короткое резюме в конце
    gain_db: 0.0
  - file_id: 1
    segment_id: 11
    start: 21.36
    end: 25.14
    text: Я отправил запрос, но сервер выдаёт ошибку пятьсот
    gain_db: 0.0
  - file_id: 4
    segment_id: 43
    start: 26.14
    end: 27.04
    text: Ой
    gain_db: 0.0
  - file_id: 2
    segment_id: 12
    start: 28.04
    end: 34.91
    text: Скорее всего, дело в конфиге. Проверь ветвь. Ветку дев. Жесть.
    gain_db: 0.0
  - file_id: 3
    segment_id: 18
    start: 35.91
    end: 38.47
    text: Мне нужен доступ к PI, токен и секретный ключ
    gain_db: 0.0
  - file_id: 1
    segment_id: 13
    start: 39.47
    end: 42.58
    text: О'кей, сейчас посмотрю логи и сразу отпишусь
    gain_db: 0.0
  - file_id: 4
    segment_id: 47
    start: 43.58
    end: 44.32
    text: Ок
    gain_db: 0.0
  - file_id: 1
    segment_id: 36
    start: 45.32
    end: 48.88
    text: Да как так-то? Мы же договаривались на утро.
    gain_db: 0.0
  - file_id: 2
    segment_id: 37
    start: 49.88
    end: 52.65
    text: Слушай, ну не сердись. Планы немного поменялись
    gain_db: 0.0
  - file_id: 4
    segment_id: 51
    start: 53.65
    end: 54.61
    text: в смысле
    gain_db: 0.0
  - file_id: 1
    segment_id: 16
    start: 55.61
    end: 58.78
    text: Сумма три тысячи четыреста пятьдесят рублей
    gain_db: 0.0
  - file_id: 2
    segment_id: 20
    start: 59.78
    end: 63.05
    text: Пожалуйста, повтори последнюю цифру ещё раз
    gain_db: 0.0
  - file_id: 3
    segment_id: 49
    start: 64.05
    end: 66.44
    text: Секунду. Я отвлёкся. Продолжаем.
    gain_db: 0.0
  - file_id: 4
    segment_id: 54
    start: 67.44
    end: 68.21
    text: Точно
    gain_db: 0.0
  - file_id: 1
    segment_id: 68
    start: 69.21
    end: 71.42
    text: Сколько минут осталось до конца
    gain_db: 0.0
  - file_id: 2
    segment_id: 70
    start: 72.42
    end: 75.2
    text: Осталось примерно семь минут. Может, чуть меньше
    gain_db: 0.0
  - file_id: 1
    segment_id: 84
    start: 76.2
    end: 78.54
    text: Давай закругляться. Время уже поджимает
    gain_db: 0.0
  - file_id: 2
    segment_id: 85
    start: 79.54
    end: 83.03
    text: На этом всё. Запись можно останавливать
    gain_db: 0.0
