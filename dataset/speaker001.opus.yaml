  speech_start: 107.42
  speech_end: 111.16
- id: 21
  speaker_id: 1
  file_id: 1
  text: Пожалуйста, повтори последнюю цифру ещё раз
  speech_start: 114.04
  speech_end: 116.89
- id: 22
  speaker_id: 1
  file_id: 1
