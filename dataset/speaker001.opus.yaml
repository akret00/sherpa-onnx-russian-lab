  speech_start: 120.98
  speech_end: 123.96
- id: 24
  speaker_id: 1
  file_id: 1
  text: Проверка. Один, два, три, четыре, пять.
  speech_start: 126.36
  speech_end: 131.64
- id: 25
  speaker_id: 1
  file_id: 1
