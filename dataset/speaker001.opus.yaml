  speech_start: 154.23
  speech_end: 157.85
- id: 29
  speaker_id: 1
  file_id: 1
  text: Скажи, пожалуйста, во сколько начинается встреча
  speech_start: 160.98
  speech_end: 163.96
- id: 30
  speaker_id: 1
  file_id: 1
