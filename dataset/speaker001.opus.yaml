  speech_start: 432.28
  speech_end: 433.21
- id: 86
  speaker_id: 1
  file_id: 1
  text: Минутку, я сейчас найду нужный документ
  speech_start: 436.02
  speech_end: 438.81
- id: 87
  speaker_id: 1
  file_id: 1
