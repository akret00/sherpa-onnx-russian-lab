  speech_end: 6.81
- id: 3
  speaker_id: 1
  file_id: 1
  text: Сегодня я говорю нормально и достаточно спокойно
  speech_start: 8.57
  speech_end: 11.84
- id: 4
  speaker_id: 1
  file_id: 1
  text: А сейчас попробую говорить чуть быстрее, не сбиваясь.
  speech_start: 13.72
  speech_end: 16.76
- id: 5
  speaker_id: 1
  file_id: 1
  text: Э-э, подожди, я начну заново. Говорю чуть быстрее
  speech_start: 18.46
  speech_end: 22.27
- id: 6
  speaker_id: 1
  file_id: 1
  text: Мне нужен доступ к PI, токены секретный ключ.
  speech_start: 24.63
  speech_end: 28.32
- id: 7
  speaker_id: 1
  file_id: 1
  text: GPU перегружен, а CPU ещё терпит.
  speech_start: 30.23
  speech_end: 33.47
- id: 8
  speaker_id: 1
  file_id: 1
  text: Давай обсудим план. Сначала подготовка, потом тесты
  speech_start: 36.31
  speech_end: 39.96
- id: 9
  speaker_id: 1
  file_id: 1
  text: Потом отчёты и короткое резюме в конце.
  speech_start: 42.42
  speech_end: 45.34
- id: 10
  speaker_id: 1
  file_id: 1
  text: Файл называется Test AudioFinel 2
  speech_start: 47.48
  speech_end: 50.75
- id: 11
  speaker_id: 1
  file_id: 1
  text: Сохрани, как ваф 16 кгц моно
  speech_start: 52.6
  speech_end: 56.51
- id: 12
  speaker_id: 1
  file_id: 1
  text: Я отправил запрос, но сервер выдаёт ошибку 500
  speech_start: 58.39
  speech_end: 62.17
- id: 13
  speaker_id: 1
  file_id: 1
  text: Скорее всего, дело в конфиге. Проверь ветку дев.
  speech_start: 64.25
  speech_end: 67.61
- id: 14
  speaker_id: 1
  file_id: 1
  text: О'кей, сейчас посмотрю логи и сразу отпишусь
  speech_start: 68.89
  speech_end: 72.0
- id: 15
  speaker_id: 1
  file_id: 1
  text: 'Запиши адрес: улица Лесная, дом 7, квартира 12'
  speech_start: 75.1
  speech_end: 80.0
- id: 16
  speaker_id: 1
  file_id: 1
  text: Мой номер заказа 2024—001
  speech_start: 82.17
  speech_end: 87.2
- id: 17
  speaker_id: 1
  file_id: 1
  text: Сумма 3 450 ₽
  speech_start: 89.5
  speech_end: 92.67
- id: 18
  speaker_id: 1
  file_id: 1
  text: Скидка 10%, действует до пятницы
  speech_start: 95.35
  speech_end: 98.62
- id: 19
  speaker_id: 1
  file_id: 1
  text: ООО Линия и ИП Петров — разные получатели.
  speech_start: 100.73
  speech_end: 104.76
- id: 20
  speaker_id: 1
  file_id: 1
