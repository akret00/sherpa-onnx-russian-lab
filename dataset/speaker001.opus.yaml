  speech_start: 307.03
  speech_end: 311.13
- id: 62
  speaker_id: 1
  file_id: 1
  text: С одной стороны, это дорого, с другой — надёжно
  speech_start: 314.17
  speech_end: 317.5
- id: 63
  speaker_id: 1
  file_id: 1
  text: Тот, кто придёт последним, будет закрывать офис.
  speech_start: 320.15
  speech_end: 322.91
- id: 64
  speaker_id: 1
  file_id: 1
