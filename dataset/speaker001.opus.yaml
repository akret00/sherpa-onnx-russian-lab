  speech_start: 166.46
  speech_end: 170.04
- id: 31
  speaker_id: 1
  file_id: 1
  text: Нет, так не пойдёт. Давай сделаем по-другому.
  speech_start: 172.34
  speech_end: 175.1
- id: 32
  speaker_id: 1
  file_id: 1
  text: Я думаю, нет, я уверен, это правильное решение.
  speech_start: 177.43
  speech_end: 181.15
- id: 33
  speaker_id: 1
  file_id: 1
  text: Ключи от гаража, кажется, лежат у зеркала.
  speech_start: 183.64
  speech_end: 186.68
- id: 34
  speaker_id: 1
  file_id: 1
  text: Ты серьёзно? Я там уже смотрел два раза.
  speech_start: 188.95
  speech_end: 192.0
- id: 35
  speaker_id: 1
  file_id: 1
  text: Ладно, проверю ещё раз и напишу тебе
  speech_start: 193.78
  speech_end: 196.6
- id: 36
  speaker_id: 1
  file_id: 1
  text: Не перебивай меня, я сейчас договорил.
  speech_start: 198.9
  speech_end: 201.31
- id: 37
  speaker_id: 1
