  speech_start: 279.48
  speech_end: 280.54
- id: 56
  speaker_id: 1
  file_id: 1
  text: Вопрос сложный, но ответ короткий. Да.
  speech_start: 283.1
  speech_end: 286.3
- id: 57
  speaker_id: 1
  file_id: 1
  text: Вопрос сложный, но ответ короткий — нет
  speech_start: 289.11
  speech_end: 292.38
- id: 58
  speaker_id: 1
  file_id: 1
  text: 'Сейчас будет перечисление: Чй, кофе, вода, сок'
  speech_start: 294.49
  speech_end: 299.36
- id: 59
  speaker_id: 1
  file_id: 1
