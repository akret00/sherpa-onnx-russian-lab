recipe_type: "four_speakers_two_leads_two_commentators"
description: >
  Сценарий с четырьмя говорящими. Говорящие 1 и 2 ведут основной диалог.
  Говорящий 3 периодически вносит технические исправления.
  Говорящий 4 дает короткие эмоциональные реакции.

timeline:
  # Начало созвона (Лидеры настраивают связь)
  - step_id: 1
    speaker_id: 1
    phrase_id: 1 # "Привет. Проверяем запись голоса, раз, два, три."
  - step_id: 2
    speaker_id: 2
    phrase_id: 64 # "Проверка связи: слышно меня хорошо?"
  
  # Подключается комментатор 3 с технической репликой
  - step_id: 3
    speaker_id: 3
    phrase_id: 65 # "Да, слышно. Говори чуть ближе к микрофону."
  
  # Основной диалог лидеров
  - step_id: 4
    speaker_id: 1
    phrase_id: 7 # "Давай обсудим план: сначала подготовка, потом тесты."
  - step_id: 5
    speaker_id: 2
    phrase_id: 8 # "Потом отчёт и короткое резюме в конце."
  - step_id: 6
    speaker_id: 1
    phrase_id: 11 # "Я отправил запрос, но сервер выдает ошибку пятьсот."
  
  # Комментатор 4 реагирует коротко
  - step_id: 7
    speaker_id: 4
    phrase_id: 43 # "Ой"
  
  # Лидеры продолжают, комментатор 3 снова уточняет детали
  - step_id: 8
    speaker_id: 2
    phrase_id: 12 # "Скорее всего, дело в конфиге, проверь ветку дев."
  - step_id: 9
    speaker_id: 3
    phrase_id: 5 # "Мне нужен доступ к API, токен и секретный ключ."
  - step_id: 10
    speaker_id: 1
    phrase_id: 13 # "Окей, сейчас посмотрю логи и сразу отпишусь."
  
  # Комментатор 4 соглашается
  - step_id: 11
    speaker_id: 4
    phrase_id: 47 # "Ок"
  
  # Бытовой спор лидеров
  - step_id: 12
    speaker_id: 1
    phrase_id: 36 # "Да как так-то? Мы же договаривались на утро!"
  - step_id: 13
    speaker_id: 2
    phrase_id: 37 # "Слушай, ну не сердись, планы немного поменялись."
  
  # Резкое включение комментатора 4
  - step_id: 14
    speaker_id: 4
    phrase_id: 51 # "В смысле?"
  
  # Лидеры возвращаются к цифрам
  - step_id: 15
    speaker_id: 1
    phrase_id: 16 # "Сумма: три тысячи четыреста пятьдесят рублей."
  - step_id: 16
    speaker_id: 2
    phrase_id: 20 # "Пожалуйста, повтори последнюю цифру ещё раз."
  
  # Комментатор 3 перебивает с точными данными
  - step_id: 17
    speaker_id: 3
    phrase_id: 25 # "ИНН семьдесят семь ноль один, далее без изменений."
  
  # Комментатор 4 подтверждает
  - step_id: 18
    speaker_id: 4
    phrase_id: 54 # "Точно"
  
  # Завершение сессии лидерами
  - step_id: 19
    speaker_id: 1
    phrase_id: 69 # "Сколько минут осталось до конца?"
  - step_id: 20
    speaker_id: 2
    phrase_id: 70 # "Осталось примерно семь минут, может чуть меньше."
  - step_id: 21
    speaker_id: 1
    phrase_id: 84 # "Давай закругляться, время уже поджимает."
  - step_id: 22
    speaker_id: 2
    phrase_id: 85 # "На этом всё. Запись можно останавливать."
